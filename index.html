<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mnemosyne — Tides of Memory Boon Database</title>
<style>
  :root {
    --bg: #0e1116; --panel: #161b24; --panel2: #1c2230; --line: #2a3244;
    --text: #d7dce4; --dim: #8891a0; --gold: #e8b64c;
    --common: #6fca6f; --uncommon: #6ba8ff; --rare: #b07fe8; --legendary: #e8b64c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  header { padding: 28px 20px 10px; text-align: center; }
  header h1 { margin: 0; font-size: 26px; color: var(--gold); letter-spacing: .5px; }
  header p { margin: 6px 0 0; color: var(--dim); font-size: 13px; }
  .totals { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 16px 0 4px; }
  .totals div { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 16px; text-align: center; }
  .totals b { display: block; font-size: 20px; color: var(--gold); }
  .totals span { font-size: 12px; color: var(--dim); }
  nav { display: flex; gap: 6px; justify-content: center; margin: 18px 0 0; flex-wrap: wrap; }
  nav button { background: var(--panel); color: var(--dim); border: 1px solid var(--line);
    border-bottom: none; border-radius: 8px 8px 0 0; padding: 9px 22px; font-size: 14px;
    cursor: pointer; }
  nav button.on { background: var(--panel2); color: var(--gold); }
  main { max-width: 1060px; margin: 0 auto 60px; background: var(--panel2);
    border: 1px solid var(--line); border-radius: 10px; padding: 18px; }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .controls input { flex: 1; min-width: 220px; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 6px; padding: 8px 12px; font-size: 14px; }
  .chip { background: var(--panel); border: 1px solid var(--line); border-radius: 20px;
    padding: 5px 14px; font-size: 13px; color: var(--dim); cursor: pointer; }
  .chip.on { color: var(--text); border-color: currentColor; }
  .chip.common.on { color: var(--common); } .chip.uncommon.on { color: var(--uncommon); }
  .chip.rare.on { color: var(--rare); } .chip.legendary.on { color: var(--legendary); }
  select { background: var(--panel); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 8px 10px; font-size: 13px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line);
    vertical-align: top; }
  th { color: var(--dim); font-size: 12px; text-transform: uppercase; letter-spacing: .5px;
    position: sticky; top: 0; background: var(--panel2); }
  td.num, th.num { text-align: right; white-space: nowrap; }
  .r-common { color: var(--common); } .r-uncommon { color: var(--uncommon); }
  .r-rare { color: var(--rare); } .r-legendary { color: var(--legendary); }
  .r- { color: var(--dim); }
  .bname { font-weight: 600; white-space: nowrap; }
  .desc { color: var(--dim); font-size: 13.5px; }
  .quote { color: var(--dim); font-size: 12.5px; font-style: italic; opacity: .75; margin-top: 2px; }
  .scroller { overflow-x: auto; }
  .empty { color: var(--dim); text-align: center; padding: 30px; }
  footer { text-align: center; color: var(--dim); font-size: 12px; padding-bottom: 30px; }
  footer a { color: var(--dim); }
</style>
</head>
<body>
<header>
  <h1>Mnemosyne &mdash; Tides of Memory</h1>
  <p>Boon database &middot; captured in-game by the Treyal Mudlet tracker</p>
  <div class="totals" id="totals"></div>
  <nav id="tabs"></nav>
</header>
<main id="main"></main>
<footer>Generated <span id="gen"></span></footer>
<script src="data.js"></script>
<script>
const D = window.BOON_DATA || { boons: [], affixes: [], bosses: [], totals: {} };
const RANK = { legendary: 0, rare: 1, uncommon: 2, common: 3, "": 4 };
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

document.getElementById("gen").textContent = D.generated || "?";
document.getElementById("totals").innerHTML = [
  [D.totals.boons, "boons seen"], [D.totals.affixes, "affixes"], [D.totals.bosses, "bosses"],
].map(([n, l]) => `<div><b>${n ?? 0}</b><span>${l}</span></div>`).join("");

const state = { tab: "boons", q: "", rarities: new Set(), sort: "name" };

const TABS = [["boons", "Boons"], ["affixes", "Affixes"], ["bosses", "Bosses"]];
const tabsEl = document.getElementById("tabs");
tabsEl.innerHTML = TABS.map(([id, label]) =>
  `<button data-tab="${id}">${label}</button>`).join("");
tabsEl.addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  state.tab = b.dataset.tab; render();
});

function render() {
  for (const b of tabsEl.querySelectorAll("button"))
    b.classList.toggle("on", b.dataset.tab === state.tab);
  const main = document.getElementById("main");
  main.innerHTML = { boons: boonsView, affixes: affixesView, bosses: bossesView }[state.tab]();
  if (state.tab === "boons") wireBoons(main);
}

function rcell(r) { return `<span class="r-${esc(r)}">${esc(r || "?")}</span>`; }

function boonsView() {
  let list = D.boons.filter(b => {
    if (state.rarities.size && !state.rarities.has(b.rarity)) return false;
    const q = state.q.toLowerCase();
    return !q || b.name.toLowerCase().includes(q) || b.description.toLowerCase().includes(q)
      || (b.quote || "").toLowerCase().includes(q);
  });
  const sorters = {
    name: (a, b) => a.name.localeCompare(b.name),
    rarity: (a, b) => (RANK[a.rarity] ?? 9) - (RANK[b.rarity] ?? 9) || a.name.localeCompare(b.name),
  };
  list.sort(sorters[state.sort]);
  const rows = list.map(b => `<tr>
    <td class="bname r-${esc(b.rarity)}">${esc(b.name)}</td>
    <td>${rcell(b.rarity)}</td>
    <td class="desc">${esc(b.description)}${b.quote ? `<div class="quote">&ldquo;${esc(b.quote)}&rdquo;</div>` : ""}</td>
    <td class="num desc">${esc(b.lastSeen)}</td></tr>`).join("");
  return `<div class="controls">
      <input id="q" type="search" placeholder="Search ${D.boons.length} boons..." value="${esc(state.q)}">
      ${["common", "uncommon", "rare", "legendary"].map(r =>
        `<span class="chip ${r} ${state.rarities.has(r) ? "on" : ""}" data-r="${r}">${r}</span>`).join("")}
      <select id="sort">
        ${[["name", "Sort: name"], ["rarity", "Sort: rarity"]]
          .map(([v, l]) => `<option value="${v}" ${state.sort === v ? "selected" : ""}>${l}</option>`).join("")}
      </select></div>
    <div class="scroller"><table><thead><tr><th>Boon</th><th>Rarity</th><th>Description</th>
      <th class="num">Last seen</th></tr></thead>
      <tbody>${rows || `<tr><td colspan="4" class="empty">No boons match.</td></tr>`}</tbody></table></div>`;
}

function wireBoons(main) {
  const q = main.querySelector("#q");
  q.addEventListener("input", () => {
    state.q = q.value;
    const pos = q.selectionStart; render();
    const q2 = document.getElementById("q"); q2.focus(); q2.setSelectionRange(pos, pos);
  });
  main.querySelector("#sort").addEventListener("change", e => { state.sort = e.target.value; render(); });
  for (const chip of main.querySelectorAll(".chip[data-r]"))
    chip.addEventListener("click", () => {
      const r = chip.dataset.r;
      state.rarities.has(r) ? state.rarities.delete(r) : state.rarities.add(r);
      render();
    });
}

function affixesView() {
  if (!D.affixes.length) return `<div class="empty">No affixes recorded.</div>`;
  const rows = D.affixes.map(a => `<tr>
    <td class="bname">${esc(a.name)}</td>
    <td class="desc">${esc(a.description)}</td>
    <td class="num desc">${a.earliestRipple ? "r" + a.earliestRipple : "?"}</td></tr>`).join("");
  return `<div class="scroller"><table><thead><tr><th>Affix</th><th>Description</th>
    <th class="num">Earliest ripple</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function bossesView() {
  if (!D.bosses.length) return `<div class="empty">No bosses recorded.</div>`;
  return `<div class="scroller"><table><thead><tr><th>Boss</th></tr></thead><tbody>${
    D.bosses.map(b => `<tr><td class="bname">${esc(b)}</td></tr>`).join("")
  }</tbody></table></div>`;
}

render();
</script>
</body>
</html>
